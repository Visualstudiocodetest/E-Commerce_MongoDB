<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mongo Shop — E-Commerce MongoDB</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-success sticky-top shadow-sm">
    <div class="container">
      <a class="navbar-brand fw-bold" href="#" data-view="catalog">🍃 Mongo Shop</a>
      <div class="d-flex gap-2 align-items-center">
        <ul class="nav nav-pills" id="mainNav">
          <li class="nav-item"><a class="nav-link" href="#" data-view="catalog">Catalogue</a></li>
          <li class="nav-item"><a class="nav-link" href="#" data-view="orders">Commandes</a></li>
          <li class="nav-item"><a class="nav-link" href="#" data-view="dashboard">Dashboard</a></li>
        </ul>
        <span id="userInfo" class="text-white fw-semibold d-none"></span>
        <button class="btn btn-light position-relative d-none" id="cartBtn" data-view="cart">
          🛒<span id="cartBadge" class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger">0</span>
        </button>
        <button class="btn btn-outline-light btn-sm d-none" id="logoutBtn">Déconnexion</button>
      </div>
    </div>
  </nav>

  <main class="container py-4">
    <div id="alert" class="alert d-none" role="alert"></div>
    <div id="view"></div>
  </main>

  <footer class="text-center text-muted py-3 border-top">
    Projet final MongoDB — FastAPI · MongoDB Atlas · Bootstrap
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/static/app.js"></script>
</body>
</html>
